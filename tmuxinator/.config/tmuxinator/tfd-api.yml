name: tfd-api
root: ~/Code/TFD/services/legacy/core-api

pre_window: nvm use
enable_pane_titles: true

on_project_stop:
  - docker-compose down postgres
  - kill_port 5000

windows:
  - server:
      layout: main-horizontal
      panes:
        - start_database:
          - docker compose up postgres
        - start_server:
          - npm run start-dev
  - code: nvm use && nvim
  - terminal: 
    -
  - agent: nvm use && claude
